apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: brewlet
# Matches the containerd runtime name the node-provisioner registers
# (plugins."io.containerd.grpc.v1.cri".containerd.runtimes.brewlet).
handler: brewlet
scheduling:
  nodeSelector:
    # Only schedule onto nodes the provisioner has prepared with the shim + a JDK.
    brewlet.sh/runtime: "ready"
# Accounts for the JVM/runtime baseline so the scheduler reserves headroom.
overhead:
  podFixed:
    memory: "64Mi"
    cpu: "50m"
